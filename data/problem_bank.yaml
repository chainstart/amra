- problem_id: erdos-1052
  title: Finite Number of Unitary Perfect Numbers
  source: Erdős Problems
  statement: Determine whether there are only finitely many unitary perfect numbers.
  domain: number_theory
  tags:
    - divisors
    - multiplicative_functions
    - computational_search
    - formalization_candidate
  open_problem: true
  formalized: partial
  notes: Wall proved a large gap in the known sequence; a productive workflow needs both theorem formalization and counterexample or structure search.
  references:
    - https://www.erdosproblems.com/1052
    - https://oeis.org/A034898
  hypotheses:
    - The first milestone is formalizing known lemmas rather than claiming a new theorem.
  recommended_strategy:
    - Formalize divisor-sum infrastructure in Lean.
    - Encode the known gap theorem and supporting lemmas.
    - Explore bounded searches only when justified by theory.
  metadata:
    domain_search_executors:
      - executor_id: unitary_perfect.bounded_divisor_scan.v1
        interface_schema: amra.domain_search_executor.v1
        deterministic: true
        bounded: true
        default_parameters:
          max_n: 1000

- problem_id: amicable-odd-odd
  title: Odd-Odd Amicable Pair Conjecture
  source: Classical Number Theory
  statement: Determine whether there exists an amicable pair in which both numbers are odd.
  domain: number_theory
  tags:
    - amicable_numbers
    - parity
    - conjecture
    - formalization_candidate
  open_problem: true
  formalized: 'no'
  notes: This is well suited to a claim-registry-first workflow because partial progress can be framed as parity lemmas and exclusion results.
  references:
    - https://en.wikipedia.org/wiki/Amicable_numbers
    - https://oeis.org/A063990
  hypotheses:
    - A useful first deliverable is a formalized library for proper divisor sums and amicable pairs.
  recommended_strategy:
    - Rebuild known definitions and verified examples in Lean.
    - Prove structural constraints on parity and coprimality.
    - Search for finite exclusion regions before any general claim.
  metadata:
    domain_search_executors:
      - executor_id: amicable.bounded_divisor_sum_scan.v1
        interface_schema: amra.domain_search_executor.v1
        deterministic: true
        bounded: true
        default_parameters:
          max_n: 1000
          pair_parity: odd_odd

- problem_id: amicable-prime-exclusion
  title: Prime Numbers Are Not Amicable
  source: Classical Number Theory
  statement: Prove that no prime number is amicable.
  domain: number_theory
  tags:
    - amicable_numbers
    - primes
    - starter_theorem
    - formalization_candidate
  open_problem: false
  formalized: partial
  notes: This is a good starter theorem for the math pipeline because it needs a real Lean definition chain and a short structural proof.
  references:
    - https://en.wikipedia.org/wiki/Amicable_numbers
    - https://oeis.org/A063990
  hypotheses:
    - The proof should pass through the proper divisor sum of a prime.
  recommended_strategy:
    - Define proper divisor sum and amicable pairs in Lean.
    - Prove the proper divisor sum of a prime is 1.
    - Use that fact to exclude primes from any amicable pair.
  metadata:
    domain_search_executors:
      - executor_id: amicable.bounded_divisor_sum_scan.v1
        interface_schema: amra.domain_search_executor.v1
        deterministic: true
        bounded: true
        default_parameters:
          max_n: 1000

- problem_id: korselt-criterion
  title: Korselt's Criterion for Carmichael Numbers
  source: Classical Number Theory
  statement: Prove that a positive integer n is Carmichael iff n is composite, squarefree, and p - 1 divides n - 1 for every prime p dividing n.
  domain: number_theory
  tags:
    - carmichael_numbers
    - korselt
    - starter_theorem
    - computational_search
    - formalization_candidate
  open_problem: false
  formalized: partial
  notes: This deterministic track should use Korselt-style checks only as finite certificates for examples or exclusions, not as an unbounded search for new theorems.
  references:
    - https://oeis.org/A002997
  hypotheses:
    - A useful first deliverable is a checked statement of the criterion and verified small Carmichael examples.
  recommended_strategy:
    - Formalize squarefree and divisibility prerequisites.
    - Validate small examples with a bounded Korselt scan before theorem work.
    - Keep infinitude questions separate from finite executor output.
  metadata:
    domain_search_executors:
      - executor_id: carmichael.korselt_scan.v1
        interface_schema: amra.domain_search_executor.v1
        deterministic: true
        bounded: true
        default_parameters:
          max_n: 1000

- problem_id: triangle-dissection-19
  title: Triangle Dissection into 19 Congruent Triangles
