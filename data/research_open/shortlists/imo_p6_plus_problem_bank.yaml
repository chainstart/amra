  statement: "Formal Lean declaration:\n\n```lean\ntheorem agrawal_conjecture :\n\
    \  answer(sorry) ↔\n    ∀ (n r : ℕ), n > 1 → r > 0 → n.gcd r = 1 →\n      let\
    \ R := Polynomial (ZMod n)\n      let X : R := Polynomial.X\n      let I : Ideal\
