- problem_id: korselt-criterion
  title: Korselt's Criterion for Carmichael Numbers
  source: Classical Number Theory
  statement: Prove that a positive integer n is Carmichael iff n is composite, squarefree,
    and p - 1 divides n - 1 for every prime p dividing n.
  domain: number_theory
  tags:
