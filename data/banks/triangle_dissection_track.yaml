- problem_id: triangle-dissection-19
  title: Triangle Dissection into 19 Congruent Triangles
  source: Erdős Problems
  statement: Determine whether an equilateral triangle can be dissected into 19 congruent
    triangles.
  domain: geometry
  tags:
  - geometry
  - finite_case
  - computational_search
  - formalization_candidate
  open_problem: true
  formalized: 'no'
  notes: The local triangle-dissection project identifies n=19 as the main historically
    significant target after the n=7 and n=11 impossibility results.
  references:
  - https://www.erdosproblems.com/634
  - /home/biostar/work/formal-math/erdos-634-triangle/README.md
  hypotheses:
  - A viable route starts by formalizing known impossibility lemmas before any search
    for n=19.
  recommended_strategy:
  - Recover Tutte and Beeson arguments as reusable lemmas.
  - Represent admissible dissection constraints as finite certificates.
  - Treat any search output as a Lean-checkable certificate rather than a raw script
    result.
