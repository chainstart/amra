- problem_id: amicable-odd-odd
  title: Odd-Odd Amicable Pair Conjecture
  source: Classical Number Theory
  statement: Determine whether there exists an amicable pair in which both numbers
    are odd.
  domain: number_theory
  tags:
  - amicable_numbers
  - parity
  - conjecture
  - formalization_candidate
  open_problem: true
  formalized: 'no'
  notes: Open problem highlighted in the local amicable-numbers project. Partial progress
    should focus on parity, divisor-sum, and coprimality constraints.
  references:
  - https://en.wikipedia.org/wiki/Amicable_numbers
  - https://oeis.org/A063990
  - /home/biostar/work/projects/formal-math/amicable-numbers/README.md
  hypotheses:
  - A reusable divisor-sum formalization is a prerequisite for any credible attack
